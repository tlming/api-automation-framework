      title: "八百字作文（一）：

　　俗话说的好，与人不可太分明，一切善恶贤愚，要包容得。最近，我发现它可真有道理。

　　这是普通的一所学校，这是一个普通的天气，可这对我来说可不是普通的一天，因为我们班今日迎来的一名新同学小明。小明破旧的衣服上打满了补丁，黝黑的皮肤也不停的散发着臭味。原先小明家在农村，家里收入不高，但家里砸锅卖铁也要送他上学。我们本以为他会很刻苦，但不料他却是个顽皮的小孩。

　　他来的第一天，就上窜下跳，打坏了我们班的一块玻璃。我们认为他只是刚来不适应，便包容了他。但他还是那个顽皮样貌，不断给我们班添乱添堵。最终，作为班长的我被他激怒了。

　　一天放学，我把他留在了教室里，对他苦口婆心地教导：“你的性格对你的发展极为不利，它会使同学们厌恶你，教师们看扁你，其他人议论你，可是……”还没等我说完，他便打断了我：“天要黑了，我先回家了。”我顿时火冒三丈：“我的忍耐可是有限度的，我不可能随时都包容你。”他却不理我，径直走出了教室。

　　回到家，我把这件是告诉了父母，父母给我推荐了一本精装的书，昂贵的价格体现了它的不普通。

　　那本书叫做《学会包容》。书里介绍了关于包容的重要性，怎样做，和一些因为包容而成功的案例。我深深地被它吸引，一口气读完了它，感到受益匪浅，也读懂了什么是真正的包容。

　　那是一个雨天，雷电交加，落叶也随风飘扬。同学们在他们的父母的陪同下，在温暖的伞下有说有笑的走出了校门。我是班长，负责开关教室门，必须最终走，所以我只能在教室里写会儿作业，等人走完了再离开。

　　天越来越暗，剩下的人也越来越少。最终，只剩小明一个人了。我便询问小明：“你怎样还不回家呢？都已经这么晚了。”他低声告诉我，他父母在偏远的农村，他只能住在教室里面。看着他愁苦的面容和无助的眼神，想着那本使我受益匪浅的书，我顿时就包容了他，理解了他，并邀他到我家去暂时住宿。

　　包容不仅仅是说，更是体此刻具体行动中。包容是一种美德，人人都要做到它。"
